<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台错误捕获</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: #00ff00; }
        #console { background: #000; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; max-height: 600px; overflow-y: auto; }
        .error { color: #ff4444; }
        .warn { color: #ffbb00; }
        .info { color: #00bbff; }
        .btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔍 控制台错误捕获</h1>
    <p>这个页面会捕获所有 JS 错误</p>
    
    <button class="btn" onclick="loadAll()">加载所有 JS</button>
    <button class="btn" onclick="clearLog()">清空日志</button>
    
    <div id="console"></div>
    
    <script>
        var consoleDiv = document.getElementById('console');
        
        // 捕获所有错误
        window.onerror = function(msg, url, line, col, error) {
            log('❌ ERROR: ' + msg, 'error');
            log('   File: ' + url, 'error');
            log('   Line: ' + line + ':' + col, 'error');
            return false;
        };
        
        // 捕获未捕获的 Promise 拒绝
        window.onunhandledrejection = function(event) {
            log('❌ Promise Reject: ' + event.reason, 'error');
        };
        
        // 自定义日志
        function log(msg, type='info') {
            var color = type === 'error' ? 'error' : (type === 'warn' ? 'warn' : 'info');
            consoleDiv.innerHTML += '<div class="' + color + '">[' + new Date().toLocaleTimeString() + '] ' + msg + '</div>';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
            console.log(msg);
        }
        
        function clearLog() {
            consoleDiv.innerHTML = '';
        }
        
        function loadAll() {
            log('=== 开始加载所有 JS ===');
            
            var scripts = [
                'poster-themes.js?v=20260320',
                'questions-v4.js?v=20260320',
                'styles-v2.js?v=20260320',
                'personalized-interpretation-v4.js?v=20260320',
                'enhanced-weaknesses-v2.js?v=20260320',
                'celebrity-stories.js?v=20260320',
                'mystery-tags.js?v=20260320',
                'result-enhanced.js?v=20260320'
            ];
            
            var loaded = 0;
            scripts.forEach(function(src, index) {
                var s = document.createElement('script');
                s.src = src;
                s.onload = function() {
                    loaded++;
                    log('✅ [' + loaded + '/' + scripts.length + '] ' + src);
                    if (loaded === scripts.length) {
                        log('=== 所有 JS 加载完成 ===');
                        testFunctions();
                    }
                };
                s.onerror = function() {
                    log('❌ 加载失败：' + src, 'error');
                };
                document.head.appendChild(s);
            });
        }
        
        function testFunctions() {
            log('=== 测试关键函数 ===');
            log('questions: ' + (typeof questions !== 'undefined' ? '✅ ' + questions.length + '题' : '❌ 未定义'));
            log('styles: ' + (typeof styles !== 'undefined' ? '✅ ' + Object.keys(styles).length + '种' : '❌ 未定义'));
            log('posterThemes: ' + (typeof posterThemes !== 'undefined' ? '✅ ' + Object.keys(posterThemes).length + '种' : '❌ 未定义'));
            log('startTest: ' + (typeof startTest === 'function' ? '✅ 已定义' : '❌ 未定义'));
            log('renderQuestion: ' + (typeof renderQuestion === 'function' ? '✅ 已定义' : '❌ 未定义'));
            log('hideTopNav: ' + (typeof hideTopNav === 'function' ? '✅ 已定义' : '❌ 未定义'));
        }
        
        log('页面加载完成');
        log('提示：点击"加载所有 JS"按钮开始测试');
    </script>
</body>
</html>
