<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队功能测试</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .test-section { background: white; padding: 20px; margin: 20px 0; border-radius: 8px; }
        .btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        .result { background: #f0f4ff; padding: 15px; margin: 10px 0; border-radius: 6px; }
        input, select { padding: 10px; margin: 5px; border: 2px solid #e0e0e0; border-radius: 6px; width: 300px; }
    </style>
</head>
<body>
    <h1>🧪 团队功能测试页面</h1>
    
    <div class="test-section">
        <h2>1. 创建团队测试</h2>
        <input type="text" id="testTeamName" placeholder="团队名称" value="采购部">
        <input type="text" id="testLeaderName" placeholder="领导者姓名" value="粒子">
        <button class="btn" onclick="testCreateTeam()">创建团队</button>
        <div id="createResult" class="result hidden"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 邀请码功能测试</h2>
        <button class="btn" onclick="testCopyInvite()">复制邀请码</button>
        <div id="inviteResult" class="result hidden"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 成员管理测试</h2>
        <button class="btn" onclick="testAddMember()">添加模拟成员</button>
        <div id="memberResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 成员对比测试</h2>
        <select id="member1">
            <option value="张三">张三 - ARCD</option>
            <option value="李四">李四 - ATBD</option>
        </select>
        <select id="member2">
            <option value="李四">李四 - ATBD</option>
            <option value="张三">张三 - ARCD</option>
        </select>
        <button class="btn" onclick="testCompare()">对比成员</button>
        <div id="compareResult" class="result hidden"></div>
    </div>
    
    <div class="test-section">
        <h2>5. 团队报告测试</h2>
        <button class="btn" onclick="testExportReport()">导出报告</button>
        <div id="exportResult" class="result hidden"></div>
    </div>

    <script>
        var currentTeam = null;
        var members = [];
        
        function testCreateTeam() {
            var teamName = document.getElementById('testTeamName').value;
            var leaderName = document.getElementById('testLeaderName').value;
            
            var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            var code = '';
            for (var i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            currentTeam = {
                name: teamName,
                leader: leaderName,
                inviteCode: code,
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('currentTeam', JSON.stringify(currentTeam));
            
            document.getElementById('createResult').classList.remove('hidden');
            document.getElementById('createResult').innerHTML = 
                '<strong>✅ 团队创建成功！</strong><br>' +
                '团队名称：' + teamName + '<br>' +
                '领导者：' + leaderName + '<br>' +
                '邀请码：<strong style="font-size:20px;color:#667eea;">' + code + '</strong>';
            
            members = [
                { name: leaderName, style: 'ARCD', styleName: '战略架构师', completed: true }
            ];
            updateMemberList();
        }
        
        function testCopyInvite() {
            if (!currentTeam) {
                alert('请先创建团队');
                return;
            }
            
            navigator.clipboard.writeText(currentTeam.inviteCode).then(function() {
                document.getElementById('inviteResult').classList.remove('hidden');
                document.getElementById('inviteResult').innerHTML = '✅ 邀请码已复制到剪贴板：' + currentTeam.inviteCode;
            });
        }
        
        function testAddMember() {
            var mockMembers = [
                { name: '张三', style: 'ATBD', styleName: '果断执行者', completed: true },
                { name: '李四', style: 'ARCP', styleName: '关系建筑师', completed: true },
                { name: '王五', style: '', styleName: '', completed: false }
            ];
            
            var mock = mockMembers[Math.floor(Math.random() * mockMembers.length)];
            members.push(mock);
            updateMemberList();
        }
        
        function updateMemberList() {
            var html = '<strong>当前团队成员 (' + members.length + '人)：</strong><ul>';
            for (var i = 0; i < members.length; i++) {
                var m = members[i];
                if (m.completed) {
                    html += '<li>' + m.name + ' - ' + m.style + ' ' + m.styleName + ' ✅</li>';
                } else {
                    html += '<li>' + m.name + ' - ⏳ 待测试</li>';
                }
            }
            html += '</ul>';
            document.getElementById('memberResult').innerHTML = html;
        }
        
        function testCompare() {
            var m1 = document.getElementById('member1').value;
            var m2 = document.getElementById('member2').value;
            
            if (m1 === m2) {
                alert('请选择不同的成员');
                return;
            }
            
            document.getElementById('compareResult').classList.remove('hidden');
            document.getElementById('compareResult').innerHTML = 
                '<strong>⚔️ 对比结果：' + m1 + ' vs ' + m2 + '</strong><br><br>' +
                '<strong>决策风格：</strong> 分析型 71% vs 直觉型 64%<br>' +
                '<strong>关系导向：</strong> 关系型 57% vs 任务型 71%<br>' +
                '<strong>风险态度：</strong> 谨慎型 86% vs 冒险型 57%<br>' +
                '<strong>沟通方式：</strong> 直接型 64% vs 说服型 71%<br><br>' +
                '<strong>💡 协作建议：</strong> 两人风格互补，建议前期由' + m1 + '做数据分析，后期由' + m2 + '推动决策执行。';
        }
        
        function testExportReport() {
            document.getElementById('exportResult').classList.remove('hidden');
            document.getElementById('exportResult').innerHTML = 
                '📥 PDF 报告生成中...<br><br>' +
                '<em>（此功能需要后端支持，当前为演示版本）</em><br><br>' +
                '报告内容预览：<br>' +
                '<ul>' +
                '<li>团队整体风格：关系型 + 任务型</li>' +
                '<li>团队优势：关系维护、执行力强、风险意识</li>' +
                '<li>团队缺口：缺少冒险型、直觉型成员</li>' +
                '<li>发展建议：创新思维培训、直觉决策工作坊</li>' +
                '</ul>';
        }
        
        // 页面加载时检查是否有保存的团队
        window.onload = function() {
            var saved = localStorage.getItem('currentTeam');
            if (saved) {
                currentTeam = JSON.parse(saved);
                document.getElementById('createResult').classList.remove('hidden');
                document.getElementById('createResult').innerHTML = 
                    '<strong>📋 已加载之前创建的团队：</strong><br>' +
                    '团队名称：' + currentTeam.name + '<br>' +
                    '邀请码：' + currentTeam.inviteCode;
            }
        };
    </script>
</body>
</html>
