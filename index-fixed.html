<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购谈判风格测试 v2.1 - 发现你的谈判超能力</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
        .hero { text-align: center; padding: 30px 0 20px; }
        .hero h1 { font-size: 24px; color: #333; margin-bottom: 10px; }
        .hero p { color: #666; margin-bottom: 20px; }
        .btn-start { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 18px 40px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
        .option { padding: 15px; margin: 10px 0; background: #f8f9ff; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option:hover { background: #e8ecff; }
        .option.selected { border-color: #667eea; background: #e8ecff; }
        .progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
        .btn-nav { background: #f0f0f0; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; margin: 5px; }
        .btn-nav:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage">
            <div class="hero">
                <h1>🎯 采购谈判风格测试 v2.1</h1>
                <p>28 道场景题，发现你的谈判超能力</p>
                <p style="color: #999; font-size: 13px;">已有 1,234 位采购参与测试</p>
            </div>
            <button class="btn-start" onclick="startTest()">🚀 开始测试</button>
        </div>
        
        <!-- 测试页 -->
        <div id="testPage" class="hidden">
            <div class="progress-bar"><div id="progressBar" class="progress-fill" style="width: 0%;"></div></div>
            <div id="progressText" style="text-align: center; color: #999; font-size: 13px; margin-bottom: 20px;"></div>
            <div id="questionText" style="font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px;"></div>
            <div id="optionsContainer"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="prevBtn" class="btn-nav" onclick="prevQuestion()" disabled>← 上一题</button>
                <button id="nextBtn" class="btn-nav" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>
        
        <!-- 结果页 -->
        <div id="resultPage" class="hidden">
            <div style="text-align: center; padding: 30px 0;">
                <div id="resultAnimal" style="font-size: 80px;"></div>
                <div id="resultCode" style="font-size: 48px; font-weight: bold; color: #667eea;"></div>
                <div id="resultName" style="font-size: 24px; color: #333; margin: 10px 0;"></div>
                <div id="resultRole" style="color: #666;"></div>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-start" onclick="retakeTest()">🔄 重新测试</button>
            </div>
        </div>
    </div>
    
    <script src="questions-v4.js?v=20260320"></script>
    <script src="styles-v2.js?v=20260320"></script>
    <script>
        var currentIndex = 0;
        var answers = [];
        var dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };
        
        function startTest() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('testPage').classList.remove('hidden');
            renderQuestion();
            updateProgress();
        }
        
        function renderQuestion() {
            var q = questions[currentIndex];
            document.getElementById('questionText').innerHTML = q.scene + '：<br><br>' + q.q;
            var container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            for (var i = 0; i < q.options.length; i++) {
                var opt = q.options[i];
                var div = document.createElement('div');
                div.className = 'option';
                if (answers[currentIndex] === opt.dim) div.classList.add('selected');
                div.innerHTML = '<span class="option-text">' + opt.text + '</span>';
                div.onclick = function() { selectOption(this, opt.dim); };
                container.appendChild(div);
            }
        }
        
        function selectOption(el, dim) {
            var options = document.querySelectorAll('.option');
            options.forEach(function(o) { o.classList.remove('selected'); });
            el.classList.add('selected');
            answers[currentIndex] = dim;
            dimensionScores[dim]++;
            setTimeout(function() {
                if (currentIndex < 27) {
                    currentIndex++;
                    renderQuestion();
                    updateProgress();
                    updateNav();
                } else {
                    calculateResult();
                }
            }, 300);
        }
        
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                updateProgress();
                updateNav();
            }
        }
        
        function nextQuestion() {
            if (answers[currentIndex]) {
                if (currentIndex < 27) {
                    currentIndex++;
                    renderQuestion();
                    updateProgress();
                    updateNav();
                } else {
                    calculateResult();
                }
            } else {
                alert('请先选择一个选项');
            }
        }
        
        function updateProgress() {
            var pct = ((currentIndex + 1) / 28) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            var stage = Math.floor(currentIndex / 7) + 1;
            document.getElementById('progressText').innerHTML = '<strong>' + (currentIndex + 1) + '</strong> / 28 · 第 ' + stage + ' 阶段';
        }
        
        function updateNav() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').innerHTML = currentIndex === 27 ? '查看结果 →' : '下一题 →';
        }
        
        function calculateResult() {
            var code = '';
            code += dimensionScores.A >= dimensionScores.I ? 'A' : 'I';
            code += dimensionScores.R >= dimensionScores.T ? 'R' : 'T';
            code += dimensionScores.C >= dimensionScores.B ? 'C' : 'B';
            code += dimensionScores.D >= dimensionScores.P ? 'D' : 'P';
            
            var style = styles[code];
            document.getElementById('testPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
            document.getElementById('resultAnimal').textContent = style.animal;
            document.getElementById('resultCode').textContent = code;
            document.getElementById('resultName').textContent = style.name;
            document.getElementById('resultRole').textContent = style.role;
        }
        
        function retakeTest() {
            currentIndex = 0;
            answers = [];
            dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('homePage').classList.remove('hidden');
        }
        
        window.onload = function() {
            console.log('✅ 采购谈判风格测试 v2.1 已加载');
            console.log('Questions:', typeof questions, questions.length);
            console.log('Styles:', typeof styles, Object.keys(styles).length);
        };
    </script>
</body>
</html>
