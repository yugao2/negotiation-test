<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>你的谈判风格 - 采购谈判风格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }

        .code { font-size: 36px; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .name { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .role { font-size: 16px; color: #666; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; }
        .section { margin: 25px 0; padding: 20px; background: #f8f9ff; border-radius: 12px; }

        .item { margin: 12px 0; padding: 12px; background: white; border-radius: 8px; }

        .item-text { font-size: 14px; color: #666; line-height: 1.6; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

        .radar-container { width: 100%; height: 250px; margin: 20px 0; }
        .btn { display: block; width: 100%; padding: 15px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .btn-secondary { background: #f0f0f0; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">

        <div class="section">
            <div class="section-title">📊 能力雷达图</div>
            <canvas id="radarChart" class="radar-container"></canvas>
        </div>

        <div class="section">
            <div class="section-title">🎯 谈判运势</div>
            <div class="item">
                <div class="item-label">本周建议</div>
                <div class="item-text" id="fortune"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">💰 财运指数</div>
            <div class="item">
                <div class="item-label" id="money-label"></div>
                <div class="item-text" id="money"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">❤️ 配对指数</div>
            <div class="item">
                <div class="item-label">最佳搭档</div>
                <div class="item-text" id="partner"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🏷️ 神秘标签</div>
            <div class="tags" id="tags"></div>
        </div>

        <div class="section">
            <div class="section-title">💼 职业建议</div>
            <div class="item">
                <div class="item-text" id="career"></div>
            </div>
        </div>

        <button class="btn" onclick="shareResult()">📤 分享我的结果</button>
        <button class="btn btn-secondary" onclick="retakeTest()">🔄 重新测试</button>
    </div>

    <script>

            ARCP: {animal:'🐬',name:'关系建筑师',role:'信任建立者',saving:'10-18%',rarity:'约 8%',fortune:'本周宜维护核心供应商关系，一次深度沟通胜过十次讨价还价',money:'年省潜力 10-18%，关系溢价是你的隐形武器',partner:'ARCD(战略架构师)，你维系关系他提供弹药',tags:['供应商知己','人情账户管理员','长期主义代言人'],career:'战略供应商管理、联合开发项目、长期协议谈判'},

            ARBP: {animal:'🐑',name:'温和协调者',role:'共识促成者',saving:'5-12%',rarity:'约 10%',fortune:'本周宜寻找共同利益点，和气生财是真的',money:'年省潜力 5-12%，双赢比零和更可持续',partner:'ITBD(快速决策者)，你缓和气氛他推进进度',tags:['和事佬专业户','情绪稳定器','双赢设计师'],career:'跨部门协调、供应商纠纷调解、联合降本项目管理'},
            ATCD: {animal:'🐜',name:'效率优化师',role:'流程专家',saving:'12-20%',rarity:'约 12%',fortune:'本周宜优化采购流程，效率提升就是成本下降',money:'年省潜力 12-20%，标准化是你的印钞机',partner:'ARCP(关系建筑师)，你管流程他管人情',tags:['SOP 狂魔','效率计算器','流程改造师'],career:'采购流程优化、标准化建设、数字化系统实施'},
            ATCP: {animal:'🦎',name:'数据驱动者',role:'量化分析师',saving:'10-18%',rarity:'约 9%',fortune:'本周宜深挖历史数据，数字会告诉你该砍哪里',money:'年省潜力 10-18%，每一个小数点都是钱',partner:'IRBP(魅力影响者)，你出数据他出嘴',tags:['Excel 魔法师','KPI 猎人','仪表盘控'],career:'采购数据分析、支出分析、成本建模'},
            ATBD: {animal:'🦅',name:'果断执行者',role:'结果导向者',saving:'15-22%',rarity:'约 8%',fortune:'本周宜速战速决，犹豫就会败北',money:'年省潜力 15-22%，时间就是金钱在你身上是真的',partner:'ARBD(谨慎守护者)，你冲锋他断后',tags:['deadline 杀手','说一不二','目标粉碎机'],career:'紧急采购项目、竞标谈判、价格战应对'},
            ATBP: {animal:'🐴',name:'团队推动者',role:'项目管理者',saving:'10-16%',rarity:'约 11%',fortune:'本周宜召开供应商大会，集体力量大于个人',money:'年省潜力 10-16%，团队作战能谈下更大折扣',partner:'ARCD(战略架构师)，你带团队他定方向',tags:['进度条管家','会议组织者','任务分配大师'],career:'采购项目统筹、跨部门协作、供应商大会组织'},
            IRCD: {animal:'🦊',name:'创新探索者',role:'变革推动者',saving:'12-20%',rarity:'约 6%',fortune:'本周宜尝试新供应商，老树不一定开新花',money:'年省潜力 12-20%，创新是最大降本空间',partner:'ATCD(效率优化师)，你创新他落地',tags:['破局者','新物种猎手','传统挑战者'],career:'新供应商开发、替代方案研究、创新采购模式'},
            IRCP: {animal:'🐕',name:'社交联结者',role:'人脉拓展者',saving:'8-15%',rarity:'约 10%',fortune:'本周宜参加行业聚会，饭局上能听到真话',money:'年省潜力 8-15%，人脉就是你的情报网',partner:'ATCP(数据驱动者)，你搞关系他验证',tags:['行业百事通','饭局之王','消息灵通人士'],career:'供应商关系拓展、行业资源整合、信息收集分析'},
            IRBD: {animal:'🦁',name:'风险投资者',role:'机会赌手',saving:'15-30%',rarity:'约 4%',fortune:'本周宜押注新供应商，富贵险中求',money:'年省潜力 15-30%，敢赌才能赢大的',partner:'ARBD(谨慎守护者)，你冒险他风控',tags:['赌桌高手','all in 先生','要么赢要么输'],career:'战略投资型采购、新市场开拓、颠覆性供应商引入'},
            IRBP: {animal:'🦜',name:'魅力影响者',role:'说服艺术家',saving:'10-18%',rarity:'约 7%',fortune:'本周宜面对面谈判，你的气场能压价',money:'年省潜力 10-18%，会说话就是会赚钱',partner:'ATCP(数据驱动者)，你输出他背书',tags:['谈判桌明星','嘴炮王者','气场两米八'],career:'核心谈判代表、高层对接、关键合同签署'},
            ITCD: {animal:'🦈',name:'市场洞察者',role:'趋势分析师',saving:'12-22%',rarity:'约 6%',fortune:'本周宜研究市场趋势，风口来了猪都能飞',money:'年省潜力 12-22%，预判正确能省大钱',partner:'ARCP(关系建筑师)，你看趋势他稳关系',tags:['行情预言家','周期把握者','抄底高手'],career:'市场价格预测、大宗商品采购、战略储备决策'},
            ITCP: {animal:'🐆',name:'机会捕捉者',role:'敏捷反应者',saving:'10-20%',rarity:'约 7%',fortune:'本周宜关注突发机会，手慢无是真的',money:'年省潜力 10-20%，机会窗口转瞬即逝',partner:'ARCD(战略架构师)，你抓机会他把方向',tags:['机会雷达','闪电侠','捡漏王'],career:'临时采购需求、市场波动应对、紧急议价'},
            ITBD: {animal:'🐲',name:'快速决策者',role:'直觉行动派',saving:'12-18%',rarity:'约 5%',fortune:'本周宜相信第一直觉，想太多会错过',money:'年省潜力 12-18%，果断比完美更重要',partner:'ARBP(温和协调者)，你决策他善后',tags:['拍板侠','不纠结星人','先干再说'],career:'快速采购项目、应急响应、临时决策'},
            ITBP: {animal:'🐙',name:'灵活适应者',role:'变通专家',saving:'8-15%',rarity:'约 9%',fortune:'本周宜随机应变，计划赶不上变化',money:'年省潜力 8-15%，灵活就是省钱',partner:'ATCD(效率优化师)，你变通他稳定',tags:['墙头草高手','见招拆招','没有固定套路'],career:'多变环境采购、多供应商管理、应急方案制定'}
        };

        // 获取结果
        const code = localStorage.getItem('testResult');
        const scores = JSON.parse(localStorage.getItem('testScores') || '{}');
        
        if (!code || !styles[code]) {
            alert('没有找到测试结果，请重新测试');
            window.location.href = 'test-simple.html';
        } else {
            const style = styles[code];
            
            // 填充数据
            document.getElementById('animal').textContent = style.animal;
            document.getElementById('code').textContent = code;
            document.getElementById('name').textContent = style.name;
            document.getElementById('role').textContent = style.role;
            document.getElementById('saving').textContent = style.saving;
            document.getElementById('rarity').textContent = style.rarity;
            document.getElementById('fortune').textContent = style.fortune;
            document.getElementById('money-label').textContent = '年省潜力 ' + style.saving;
            document.getElementById('money').textContent = style.money;
            document.getElementById('partner').textContent = style.partner;
            document.getElementById('career').textContent = style.career;
            
            // 填充标签
            const tagsContainer = document.getElementById('tags');
            style.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.textContent = tag;
                tagsContainer.appendChild(span);
            });
            
            // 绘制雷达图
            drawRadar(scores);
        }

        // 绘制雷达图
        function drawRadar(scores) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 2 - 20;
            
            // 计算各维度百分比
            const dims = {
                '分析': scores.A || 0,
                '直觉': scores.I || 0,
                '关系': scores.R || 0,
                '任务': scores.T || 0,
                '谨慎': scores.C || 0,
                '大胆': scores.B || 0,
                '直接': scores.D || 0,
                '说服': scores.P || 0
            };
            
            // 绘制背景网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 4; i++) {
                const r = radius * i / 4;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // 绘制维度线
            const labels = ['分析', '关系', '谨慎', '直接', '直觉', '任务', '大胆', '说服'];
            const angles = [-Math.PI/2, -Math.PI/4, 0, Math.PI/4, Math.PI/2, Math.PI*3/4, Math.PI, Math.PI*5/4];
            
            labels.forEach((label, i) => {
                const angle = angles[i];
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = '#e0e0e0';
                ctx.stroke();
                
                // 标签
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lx = centerX + Math.cos(angle) * (radius + 20);
                const ly = centerY + Math.sin(angle) * (radius + 20);
                ctx.fillText(label, lx, ly);
            });
            
            // 绘制数据多边形
            const values = [dims['分析']/7, dims['关系']/7, dims['谨慎']/7, dims['直接']/7, dims['直觉']/7, dims['任务']/7, dims['大胆']/7, dims['说服']/7];
            
            ctx.beginPath();
            values.forEach((val, i) => {
                const angle = angles[i];
                const r = radius * val;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 分享结果
        function shareResult() {
            const code = document.getElementById('code').textContent;
            const name = document.getElementById('name').textContent;
            const animal = document.getElementById('animal').textContent;
            const text = `我是${animal}${name}（${code}），年省潜力${document.getElementById('saving').textContent}！测测你是什么谈判风格？`;
            
            if (navigator.share) {
                navigator.share({title:'我的谈判风格',text:text,url:window.location.href});
            } else {
                navigator.clipboard.writeText(text + ' ' + window.location.href);
                alert('已复制到剪贴板！');
            }
        }

        // 重新测试
        function retakeTest() {
            localStorage.removeItem('testResult');
            localStorage.removeItem('testScores');
            window.location.href = 'test-simple.html';
        }
    </script>
</body>
</html>
