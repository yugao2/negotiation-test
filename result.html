<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试结果 - 采购谈判风格测试</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container result-container">
        <!-- 结果头部 -->
        <header class="result-header">
            <div class="result-badge">🎉 测试完成</div>
            <h1>你的采购谈判风格是</h1>
        </header>

        <!-- 主要结果 -->
        <main class="result-main">
            <!-- 风格代码和名称 -->
            <div class="style-identity">
                <div class="style-code" id="styleCode">----</div>
                <div class="style-name" id="styleName">加载中...</div>
                <div class="style-role" id="styleRole"></div>
                <div class="style-animal" id="styleAnimal"></div>
            </div>

            <!-- 关键指标 -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon">💰</div>
                    <div class="metric-value" id="savingPotential">--</div>
                    <div class="metric-label">年省潜力</div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon">⭐</div>
                    <div class="metric-value" id="rarity">--</div>
                    <div class="metric-label">稀有度</div>
                </div>
            </div>

            <!-- 雷达图 -->
            <div class="radar-section">
                <h3>四维度能力分析</h3>
                <canvas id="radarChart" width="300" height="300"></canvas>
                <div class="radar-legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: #4CAF50;"></span>
                        <span>决策风格</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #2196F3;"></span>
                        <span>关系导向</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #FF9800;"></span>
                        <span>风险态度</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: #E91E63;"></span>
                        <span>沟通方式</span>
                    </div>
                </div>
            </div>

            <!-- 算命维度 -->
            <div class="fortune-section">
                <h3>🔮 专属谈判运势</h3>
                <div class="fortune-cards">
                    <div class="fortune-card">
                        <div class="fortune-label">谈判运势</div>
                        <div class="fortune-value" id="fortuneNegotiation">--</div>
                    </div>
                    <div class="fortune-card">
                        <div class="fortune-label">财运指数</div>
                        <div class="fortune-value" id="fortuneWealth">--</div>
                    </div>
                    <div class="fortune-card">
                        <div class="fortune-label">配对指数</div>
                        <div class="fortune-value" id="fortuneMatch">--</div>
                    </div>
                    <div class="fortune-card">
                        <div class="fortune-label">神秘标签</div>
                        <div class="fortune-value" id="fortuneTag">--</div>
                    </div>
                    <div class="fortune-card full-width">
                        <div class="fortune-label">职业建议</div>
                        <div class="fortune-value" id="fortuneAdvice">--</div>
                    </div>
                </div>
            </div>

            <!-- 分享按钮 -->
            <div class="share-section">
                <button class="btn-primary" onclick="generatePoster()">
                    📸 生成分享海报
                </button>
                <button class="btn-secondary" onclick="copyResult()">
                    📋 复制分享文案
                </button>
            </div>

            <!-- 海报 Canvas（隐藏） -->
            <canvas id="posterCanvas" style="display: none;"></canvas>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>分享给你的采购同行，看看谁的谈判风格最厉害！</p>
            <button class="btn-text" onclick="restartTest()">🔄 重新测试</button>
        </footer>
    </div>

    <script src="js/styles.js"></script>
    <script src="js/score.js"></script>
    <script src="js/poster.js"></script>
    <script src="js/result.js"></script>
</body>
</html>
