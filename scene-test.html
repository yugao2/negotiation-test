<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>采购谈判风格测试 - 场景对话版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 0;
            overflow-x: hidden;
        }
        .container { max-width: 600px; margin: 0 auto; background: #1a3a4a; min-height: 100vh; padding: 20px; }
        .hidden { display: none !important; }
        
        /* 姓名输入弹窗 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,32,39,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: linear-gradient(135deg, #203a43, #2c5364);
            padding: 40px; border-radius: 24px;
            max-width: 400px; width: 90%; text-align: center;
            border: 2px solid #d4af37;
        }
        .modal-title { font-size: 24px; font-weight: 700; color: #ffffff; margin-bottom: 16px; }
        .modal-subtitle { font-size: 14px; color: #cccccc; margin-bottom: 24px; }
        .modal-input {
            width: 100%; padding: 18px;
            background: rgba(15,32,39,0.6);
            border: 2px solid #3a6a7a; border-radius: 12px;
            font-size: 20px; text-align: center;
            margin: 20px 0; letter-spacing: 4px; color: #ffffff;
        }
        .modal-input:focus { border-color: #d4af37; outline: none; }
        .modal-btn {
            background: linear-gradient(135deg, #2c5364, #d4af37);
            color: #0f2027; border: none;
            padding: 18px 40px; border-radius: 980px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; width: 100%;
            margin: 10px 0; transition: all 0.3s;
        }
        .modal-btn:hover { background: linear-gradient(135deg, #203a43, #e5c14a); }
        
        /* 场景信息卡片 */
        .scene-card {
            background: rgba(32,58,67,0.7);
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
            border: 1px solid rgba(58,106,122,0.3);
        }
        .scene-title {
            font-size: 20px; font-weight: 700; color: #d4af37;
            margin-bottom: 12px;
        }
        .scene-bg {
            font-size: 15px; color: #ffffff;
            line-height: 1.6; margin-bottom: 16px;
        }
        .scene-opponent {
            font-size: 14px; color: #cccccc;
            padding: 12px;
            background: rgba(44,83,100,0.3);
            border-radius: 8px;
            border-left: 3px solid #d4af37;
        }
        
        /* 对话区域 */
        .dialogue-area {
            padding: 30px 20px;
        }
        .opponent-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2c5364, #d4af37);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(212,175,55,0.3);
        }
        .opponent-speak {
            background: rgba(32,58,67,0.8);
            padding: 20px;
            border-radius: 16px;
            border-top-left-radius: 4px;
            color: #ffffff;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            border: 1px solid rgba(58,106,122,0.3);
        }
        
        /* 选项按钮 */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 22px;
            background: rgba(44,83,100,0.6);
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid #3a6a7a;
            transition: all 0.3s;
            color: #ffffff;
            font-size: 15px;
            line-height: 1.5;
        }
        .option:hover {
            background: rgba(44,83,100,0.8);
            border-color: #d4af37;
            transform: translateY(-2px);
        }
        .option.selected {
            border-color: #d4af37;
            background: rgba(212,175,55,0.15);
        }
        
        /* 进度条 */
        .progress-container {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(15,32,39,0.95);
            padding: 16px 20px;
            border-bottom: 1px solid #3a6a7a;
            z-index: 100;
        }
        .progress-bar {
            height: 4px;
            background: #1a3a4a;
            border-radius: 2px;
            margin: 12px 0 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2c5364, #d4af37);
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            font-size: 13px;
            color: #cccccc;
        }
        
        /* 结果页 */
        .result-header {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
        }
        .result-animal { font-size: 80px; margin-bottom: 10px; }
        .result-code {
            font-size: 56px; font-weight: 800;
            margin: 10px 0;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #d4af37, #f0e68c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .result-name { font-size: 24px; font-weight: 600; margin: 10px 0; color: #ffffff; }
        .result-role { font-size: 15px; color: #cccccc; margin-top: 8px; }
        
        .result-content { padding: 24px 20px 100px; }
        
        .card {
            background: rgba(32,58,67,0.7);
            border-radius: 16px;
            margin: 16px 0;
            overflow: hidden;
            border: 1px solid rgba(58,106,122,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, rgba(44,83,100,0.9), rgba(32,58,67,0.9));
            padding: 16px 20px;
            border-bottom: 1px solid #3a6a7a;
        }
        .card-title {
            font-size: 16px; font-weight: 700;
            color: #ffffff; margin: 0;
        }
        .card-body { padding: 20px; }
        
        .insight-box {
            background: linear-gradient(135deg, rgba(44,83,100,0.6), rgba(32,58,67,0.6));
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.8;
            color: #ffffff;
            white-space: pre-line;
            border-left: 4px solid #d4af37;
        }
        .insight-box.match { border-left-color: #10b981; }
        
        .dimension-bar {
            margin: 16px 0;
        }
        .dimension-label {
            font-size: 14px; color: #cccccc;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .dimension-track {
            height: 8px;
            background: rgba(44,83,100,0.3);
            border-radius: 4px;
            overflow: hidden;
        }
        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, #2c5364, #d4af37);
            border-radius: 4px;
            transition: width 0.5s;
        }
        
        .btn-action {
            background: linear-gradient(135deg, #2c5364, #d4af37);
            color: #0f2027;
            border: none;
            padding: 20px 40px;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 16px 0;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }
        .btn-action:hover {
            background: linear-gradient(135deg, #203a43, #e5c14a);
            box-shadow: 0 6px 20px rgba(212,175,55,0.4);
        }
    </style>
</head>
<body>
    <!-- 姓名输入弹窗 -->
    <div id="nameModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🌸 欢迎来到谈判基因测试</div>
            <div class="modal-subtitle">请输入您的称呼（用于对话代入感）</div>
            <input type="text" id="userName" class="modal-input" placeholder="例如：王经理" maxlength="10">
            <button class="modal-btn" onclick="startTest()">开始测试</button>
            <button class="modal-btn" onclick="startTestWithoutName()" style="background: rgba(44,83,100,0.6); color: #ffffff; border: 1px solid #3a6a7a;">跳过</button>
        </div>
    </div>

    <div class="container">
        <!-- 场景信息页 -->
        <div id="sceneInfoPage" class="hidden">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">第 0 / 28 轮</div>
            </div>
            
            <div style="padding-top: 60px;">
                <div class="scene-card">
                    <div class="scene-title" id="sceneName">场景名称</div>
                    <div class="scene-bg" id="sceneBackground">场景背景</div>
                    <div class="scene-opponent" id="sceneOpponent">对方角色</div>
                </div>
                
                <button class="btn-action" onclick="startScene()">开始谈判</button>
            </div>
        </div>

        <!-- 对话页 -->
        <div id="dialoguePage" class="hidden">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="dialogueProgressBar" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="dialogueProgressText">第 1 / 7 轮</div>
            </div>
            
            <div class="dialogue-area" style="padding-top: 80px;">
                <div class="opponent-avatar" id="opponentAvatar">👔</div>
                <div class="opponent-speak" id="opponentSpeak">对方台词</div>
                
                <div class="options-container" id="optionsContainer">
                    <!-- 选项动态生成 -->
                </div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="resultPage" class="hidden">
            <div class="result-header">
                <div class="result-animal" id="resultAnimal">🦁</div>
                <div class="result-code" id="resultCode">ARCD</div>
                <div class="result-name" id="resultName">市场猎手</div>
                <div class="result-role" id="resultRole">目标导向的市场开拓者</div>
            </div>
            
            <div class="result-content">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">💡 内心洞察</div>
                    </div>
                    <div class="card-body">
                        <div class="insight-box" id="resultInsight"></div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📊 维度分析</div>
                    </div>
                    <div class="card-body">
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>信息收集 (A/I)</span>
                                <span id="aiScore">A: 0 / I: 0</span>
                            </div>
                            <div class="dimension-track">
                                <div class="dimension-fill" id="aiBar" style="width: 50%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>关系导向 (R/T)</span>
                                <span id="rtScore">R: 0 / T: 0</span>
                            </div>
                            <div class="dimension-track">
                                <div class="dimension-fill" id="rtBar" style="width: 50%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>风险态度 (C/B)</span>
                                <span id="cbScore">C: 0 / B: 0</span>
                            </div>
                            <div class="dimension-track">
                                <div class="dimension-fill" id="cbBar" style="width: 50%"></div>
                            </div>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-label">
                                <span>策略风格 (D/P)</span>
                                <span id="dpScore">D: 0 / P: 0</span>
                            </div>
                            <div class="dimension-track">
                                <div class="dimension-fill" id="dpBar" style="width: 50%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button class="btn-action" onclick="retakeTest()">再测一次</button>
            </div>
        </div>
    </div>

    <script src="data/scenes.js"></script>
    <script src="data/styles.js"></script>
    <script>
        // 全局状态
        var userName = '';
        var currentPackage = [];
        var currentSceneIndex = 0;
        var currentRoundIndex = 0;
        var answers = [];
        var dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };
        var aggressionScore = 0; // 情绪值累计（强硬/温和）

        // 开始测试
        function startTest() {
            userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('请输入称呼或点击跳过');
                return;
            }
            initializeTest();
        }

        function startTestWithoutName() {
            userName = '';
            initializeTest();
        }

        function initializeTest() {
            // 随机选择一个场景包
            var packageIndex = Math.floor(Math.random() * 4);
            currentPackage = scenePackages[packageIndex];
            currentSceneIndex = 0;
            currentRoundIndex = 0;
            answers = [];
            dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };

            document.getElementById('nameModal').classList.add('hidden');
            showSceneInfo();
        }

        // 显示场景信息
        function showSceneInfo() {
            var scene = scenes[currentPackage[currentSceneIndex] - 1];
            
            document.getElementById('sceneInfoPage').classList.remove('hidden');
            document.getElementById('dialoguePage').classList.add('hidden');
            document.getElementById('resultPage').classList.add('hidden');

            document.getElementById('sceneName').textContent = '场景 ' + (currentSceneIndex + 1) + '/4: ' + scene.name;
            document.getElementById('sceneBackground').textContent = scene.background;
            
            var opponentName = userName ? scene.opponent.replace(/ - .*/, ' - ' + userName) : scene.opponent;
            document.getElementById('sceneOpponent').textContent = '对方：' + opponentName;

            // 更新进度
            var totalRounds = currentSceneIndex * 7;
            var pct = (totalRounds / 28) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = '第 ' + totalRounds + ' / 28 轮';
        }

        // 开始场景
        function startScene() {
            currentRoundIndex = 0;
            aggressionScore = 0; // 每个场景重置情绪值
            document.getElementById('sceneInfoPage').classList.add('hidden');
            document.getElementById('dialoguePage').classList.remove('hidden');
            renderRound();
        }

        // 渲染回合
        function renderRound() {
            var scene = scenes[currentPackage[currentSceneIndex] - 1];
            var round = scene.rounds[currentRoundIndex];

            // 更新进度
            var totalRounds = currentSceneIndex * 7 + currentRoundIndex;
            var pct = (totalRounds / 28) * 100;
            document.getElementById('dialogueProgressBar').style.width = pct + '%';
            document.getElementById('dialogueProgressText').textContent = '第 ' + (totalRounds + 1) + ' / 28 轮';

            // 渲染对方台词（支持情绪值系统）
            var opponentText = '';
            if (typeof round.opponent === 'object') {
                // 有情绪值分支的台词
                var threshold = Math.floor(currentRoundIndex / 2); // 每 2 轮调整一次阈值
                if (aggressionScore >= threshold + 1) {
                    opponentText = round.opponent.highAgg || round.opponent.default;
                } else if (aggressionScore <= threshold - 1) {
                    opponentText = round.opponent.lowAgg || round.opponent.default;
                } else {
                    opponentText = round.opponent.default;
                }
            } else {
                // 老版本：字符串直接显示
                opponentText = round.opponent;
            }
            document.getElementById('opponentSpeak').textContent = opponentText;

            // 渲染选项
            var container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            round.options.forEach(function(opt) {
                var div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = '<span class="option-text">' + opt.text + '</span>';
                div.onclick = function() { selectOption(this, opt.score, opt.agg || 0); };
                container.appendChild(div);
            });
        }

        // 选择选项
        function selectOption(el, score, agg) {
            var options = document.querySelectorAll('.option');
            options.forEach(function(o) { o.classList.remove('selected'); });
            el.classList.add('selected');

            // 计分
            dimensionScores[score]++;
            answers.push(score);
            
            // 累计情绪值
            if (agg === 1) {
                aggressionScore++;
            }

            // 延迟进入下一轮
            setTimeout(function() {
                currentRoundIndex++;
                if (currentRoundIndex < 7) {
                    renderRound();
                } else {
                    currentSceneIndex++;
                    if (currentSceneIndex < 4) {
                        showSceneInfo();
                    } else {
                        showResult();
                    }
                }
            }, 300);
        }

        // 显示结果
        function showResult() {
            document.getElementById('dialoguePage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');

            // 计算结果代码
            var code = '';
            code += dimensionScores.A >= dimensionScores.I ? 'A' : 'I';
            code += dimensionScores.R >= dimensionScores.T ? 'R' : 'T';
            code += dimensionScores.C >= dimensionScores.B ? 'C' : 'B';
            code += dimensionScores.D >= dimensionScores.P ? 'D' : 'P';

            // 获取风格数据
            var style = styles[code];

            // 渲染结果
            document.getElementById('resultAnimal').textContent = style.animal;
            document.getElementById('resultCode').textContent = code;
            document.getElementById('resultName').textContent = style.name;
            document.getElementById('resultRole').textContent = style.role;

            // 渲染内心洞察
            document.getElementById('resultInsight').textContent = style.insight || '您的谈判风格独特，善于在不同场景下灵活应对。';

            // 渲染维度分析
            renderDimensionBar('ai', dimensionScores.A, dimensionScores.I);
            renderDimensionBar('rt', dimensionScores.R, dimensionScores.T);
            renderDimensionBar('cb', dimensionScores.C, dimensionScores.B);
            renderDimensionBar('dp', dimensionScores.D, dimensionScores.P);
        }

        function renderDimensionBar(prefix, score1, score2) {
            document.getElementById(prefix + 'Score').textContent = 
                prefix.toUpperCase() + ': ' + score1 + ' / ' + (prefix === 'ai' ? 'I' : prefix === 'rt' ? 'T' : prefix === 'cb' ? 'B' : 'P') + ': ' + score2;
            
            var total = score1 + score2;
            var pct = total > 0 ? (score1 / total) * 100 : 50;
            document.getElementById(prefix + 'Bar').style.width = pct + '%';
        }

        // 重测
        function retakeTest() {
            location.reload();
        }
    </script>
</body>
</html>
