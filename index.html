<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购谈判风格测试 - 发现你的谈判基因</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1c1c1e, #2c2c2e); color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card-header { margin-bottom: 16px; }
        .card-title { font-size: 20px; font-weight: 700; color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #0071e3, #005bb5); color: #fff; border: none; padding: 16px 32px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-secondary { background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; }
        .option { background: #2c2c2e; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option:hover { border-color: #0071e3; background: #3a3a3c; }
        .option.selected { border-color: #0071e3; background: rgba(0,113,227,0.2); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 12px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #0071e3, #34c759); border-radius: 2px; transition: width 0.3s; }
        .progress-text { font-size: 13px; color: #86868b; text-align: center; }
        .animal { font-size: 64px; text-align: center; margin: 20px 0; }
        .tag { display: inline-block; background: rgba(0,113,227,0.2); color: #0071e3; padding: 6px 12px; border-radius: 980px; font-size: 12px; margin: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="homePage" class="page active">
            <div class="card">
                <div class="animal">🦉🦅🦊🐺</div>
                <h1 style="font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 16px;">采购谈判风格测试</h1>
                <p style="color: #86868b; text-align: center; line-height: 1.8; margin-bottom: 24px;">28 道题，发现你的谈判基因<br>找到你的最佳搭档，提升谈判效能</p>
                <button class="btn-primary" onclick="startTest()">开始测试</button>
            </div>
        </div>
        <div id="testPage" class="page">
            <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
            <div class="progress-text" id="progressText">第 1 / 28 题 · 第 1 阶段</div>
            <div class="card">
                <div style="font-size: 13px; color: #86868b; margin-bottom: 8px;" id="scene"></div>
                <div style="font-size: 17px; font-weight: 600; margin-bottom: 24px; line-height: 1.5;" id="question"></div>
                <div id="options"></div>
            </div>
            <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题</button>
        </div>
        <div id="resultPage" class="page">
            <div class="animal" id="resultAnimal"></div>
            <h1 style="text-align: center; margin-bottom: 8px;"><span id="resultCode"></span> <span id="resultName"></span></h1>
            <p style="text-align: center; color: #86868b; margin-bottom: 24px;" id="resultRole"></p>
            <div class="card">
                <div class="card-header"><div class="card-title">🎯 你的谈判风格</div></div>
                <div class="card-body" id="mbtiInsight"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🏷️ 神秘标签</div></div>
                <div class="card-body" id="mysteryTags"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🤝 最佳搭档</div></div>
                <div class="card-body" id="bestMatch"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🤝 谈判搭子</div></div>
                <div class="card-body">
                    <p style="color:#86868b;font-size:14px;margin-bottom:20px;">想知道如何跟 XX 风格合作？点击下方风格按钮，立即查看合作指南</p>
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
                        <button class="btn-secondary" onclick="selectPartnerCode('ARCD')">ARCD<br><span style="font-size:10px;color:#86868b;">战略架构师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARCP')">ARCP<br><span style="font-size:10px;color:#86868b;">关系建筑师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARBD')">ARBD<br><span style="font-size:10px;color:#86868b;">创新探索者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARBP')">ARBP<br><span style="font-size:10px;color:#86868b;">团队推动者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATCD')">ATCD<br><span style="font-size:10px;color:#86868b;">市场洞察者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATCP')">ATCP<br><span style="font-size:10px;color:#86868b;">快速决策者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATBD')">ATBD<br><span style="font-size:10px;color:#86868b;">战略架构师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATBP')">ATBP<br><span style="font-size:10px;color:#86868b;">效率优化师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRCD')">IRCD<br><span style="font-size:10px;color:#86868b;">数据驱动者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRCP')">IRCP<br><span style="font-size:10px;color:#86868b;">关系联结者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRBD')">IRBD<br><span style="font-size:10px;color:#86868b;">果断执行者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRBP')">IRBP<br><span style="font-size:10px;color:#86868b;">温和协调者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITCD')">ITCD<br><span style="font-size:10px;color:#86868b;">灵活适应者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITCP')">ITCP<br><span style="font-size:10px;color:#86868b;">社交联结者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITBD')">ITBD<br><span style="font-size:10px;color:#86868b;">谨慎守护者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITBP')">ITBP<br><span style="font-size:10px;color:#86868b;">愿景推动者</span></button>
                    </div>
                    <div id="cooperationResult" class="hidden" style="margin-top:20px;"></div>
                </div>
            </div>
            <button class="btn-primary" onclick="goHome()">返回首页</button>
        </div>
    </div>
    <script src="all-in-one-v2.js?t=202603212240"></script>
    <script src="questions-v4.js?t=202603212240"></script>
    <script>
        var currentIndex = 0, answers = [], dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 }, currentResult = null, currentUserResult = null;
        (function initFromStorage() { var savedResult = localStorage.getItem('myTestResult'); if (savedResult) { try { var r = JSON.parse(savedResult); if (r && r.code && r.style) { currentResult = r; currentUserResult = r; window.currentResult = r; window.currentUserResult = r; console.log('从 localStorage 恢复 currentResult:', r); } } catch(e) { console.error('解析失败:', e); } } })();
        function startTest() { document.getElementById('homePage').classList.remove('active'); document.getElementById('testPage').classList.add('active'); currentIndex = 0; answers = []; dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 }; renderQuestion(); updateProgress(); }
        function renderQuestion() { var q = questions[currentIndex]; document.getElementById('scene').textContent = q.scene; document.getElementById('question').textContent = q.q; var html = ''; q.options.forEach(function(opt, i) { html += '<div class="option" onclick="selectOption(this, \'' + opt.dim + '\')">' + opt.text + '</div>'; }); document.getElementById('options').innerHTML = html; document.getElementById('nextBtn').style.display = 'none'; }
        function selectOption(el, dim) { document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); }); el.classList.add('selected'); answers[currentIndex] = dim; dimensionScores[dim]++; document.getElementById('nextBtn').style.display = 'block'; }
        function nextQuestion() { if (answers[currentIndex]) { if (currentIndex < 27) { currentIndex++; renderQuestion(); updateProgress(); } else { calculateResult(); } } }
        function updateProgress() { var pct = ((currentIndex + 1) / 28) * 100; document.getElementById('progressBar').style.width = pct + '%'; var stage = Math.floor(currentIndex / 7) + 1; document.getElementById('progressText').textContent = '第 ' + (currentIndex + 1) + ' / 28 题 · 第 ' + stage + ' 阶段'; }
        function calculateResult() { var type = ''; type += dimensionScores.A >= dimensionScores.I ? 'A' : 'I'; type += dimensionScores.R >= dimensionScores.T ? 'R' : 'T'; type += dimensionScores.C >= dimensionScores.B ? 'C' : 'B'; type += dimensionScores.D >= dimensionScores.P ? 'D' : 'P'; currentResult = { code: type, style: styles[type] }; currentUserResult = { code: type, style: styles[type] }; window.currentResult = currentResult; window.currentUserResult = currentUserResult; localStorage.setItem('myTestResult', JSON.stringify(currentUserResult)); document.getElementById('testPage').classList.remove('active'); document.getElementById('resultPage').classList.add('active'); document.getElementById('resultAnimal').textContent = styles[type].animal; document.getElementById('resultCode').textContent = type; document.getElementById('resultName').textContent = styles[type].name; document.getElementById('resultRole').textContent = styles[type].role; if (typeof renderBestMatchOptimized === 'function') { renderBestMatchOptimized(type); } window.scrollTo(0, 0); }
        function goHome() { document.getElementById('resultPage').classList.remove('active'); document.getElementById('homePage').classList.add('active'); }
    </script>
</body>
</html>
