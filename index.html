<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购谈判风格测试 - 发现你的谈判基因</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1c1c1e, #2c2c2e); color: #fff; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card-header { margin-bottom: 16px; }
        .card-title { font-size: 20px; font-weight: 700; color: #fff; }
        .btn-primary { background: linear-gradient(135deg, #0071e3, #005bb5); color: #fff; border: none; padding: 16px 32px; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
        .btn-secondary { background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 13px; }
        .option { background: #2c2c2e; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option:hover { border-color: #0071e3; background: #3a3a3c; }
        .option.selected { border-color: #0071e3; background: rgba(0,113,227,0.2); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 12px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #0071e3, #34c759); border-radius: 2px; transition: width 0.3s; }
        .progress-text { font-size: 13px; color: #86868b; text-align: center; }
        .animal { font-size: 64px; text-align: center; margin: 20px 0; }
        .tag { display: inline-block; background: rgba(0,113,227,0.2); color: #0071e3; padding: 6px 12px; border-radius: 980px; font-size: 12px; margin: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <div class="card">
                <div class="animal">🦉🦅🦊🐺</div>
                <h1 style="font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 16px;">采购谈判风格测试</h1>
                <p style="color: #86868b; text-align: center; line-height: 1.8; margin-bottom: 24px;">28 道题，发现你的谈判基因<br>找到你的最佳搭档，提升谈判效能</p>
                <button class="btn-primary" onclick="startTest()">开始测试</button>
            </div>
        </div>
        
        <!-- 测试页 -->
        <div id="testPage" class="page">
            <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
            <div class="progress-text" id="progressText">第 1 / 28 题 · 第 1 阶段</div>
            <div class="card">
                <div style="font-size: 13px; color: #86868b; margin-bottom: 8px;" id="scene"></div>
                <div style="font-size: 17px; font-weight: 600; margin-bottom: 24px; line-height: 1.5;" id="question"></div>
                <div id="options"></div>
            </div>
            <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题</button>
        </div>
        
        <!-- 结果页 -->
        <div id="resultPage" class="page">
            <div class="animal" id="resultAnimal"></div>
            <h1 style="text-align: center; margin-bottom: 8px;"><span id="resultCode"></span> <span id="resultName"></span></h1>
            <p style="text-align: center; color: #86868b; margin-bottom: 24px;" id="resultRole"></p>
            <div class="card">
                <div class="card-header"><div class="card-title">🎯 你的谈判风格</div></div>
                <div class="card-body" id="mbtiInsight"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🏷️ 神秘标签</div></div>
                <div class="card-body" id="mysteryTags"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🤝 最佳搭档</div></div>
                <div class="card-body" id="bestMatch"></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🤝 谈判搭子</div></div>
                <div class="card-body">
                    <p style="color:#86868b;font-size:14px;margin-bottom:20px;">想知道如何跟 XX 风格合作？点击下方风格按钮，立即查看合作指南</p>
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
                        <button class="btn-secondary" onclick="selectPartnerCode('ARCD')">ARCD<br><span style="font-size:10px;color:#86868b;">战略架构师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARCP')">ARCP<br><span style="font-size:10px;color:#86868b;">关系建筑师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARBD')">ARBD<br><span style="font-size:10px;color:#86868b;">创新探索者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ARBP')">ARBP<br><span style="font-size:10px;color:#86868b;">团队推动者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATCD')">ATCD<br><span style="font-size:10px;color:#86868b;">市场洞察者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATCP')">ATCP<br><span style="font-size:10px;color:#86868b;">快速决策者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATBD')">ATBD<br><span style="font-size:10px;color:#86868b;">战略架构师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ATBP')">ATBP<br><span style="font-size:10px;color:#86868b;">效率优化师</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRCD')">IRCD<br><span style="font-size:10px;color:#86868b;">数据驱动者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRCP')">IRCP<br><span style="font-size:10px;color:#86868b;">关系联结者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRBD')">IRBD<br><span style="font-size:10px;color:#86868b;">果断执行者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('IRBP')">IRBP<br><span style="font-size:10px;color:#86868b;">温和协调者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITCD')">ITCD<br><span style="font-size:10px;color:#86868b;">灵活适应者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITCP')">ITCP<br><span style="font-size:10px;color:#86868b;">社交联结者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITBD')">ITBD<br><span style="font-size:10px;color:#86868b;">谨慎守护者</span></button>
                        <button class="btn-secondary" onclick="selectPartnerCode('ITBP')">ITBP<br><span style="font-size:10px;color:#86868b;">愿景推动者</span></button>
                    </div>
                    <div id="cooperationResult" class="hidden" style="margin-top:20px;"></div>
                </div>
            </div>
            <button class="btn-primary" onclick="goHome()">返回首页</button>
        </div>
    </div>
    
    <!-- 所有逻辑合并到一个文件 -->
    <script src="all-in-one.js?t=202603212230"></script>
    <script src="questions-v5.js?t=202603212230"></script>
    
    <script>
        var currentIndex = 0;
        var answers = [];
        var dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };
        var currentResult = null;
        var currentUserResult = null;
        
        // 页面加载时恢复
        (function initFromStorage() {
            var savedResult = localStorage.getItem('myTestResult');
            if (savedResult) {
                try {
                    var r = JSON.parse(savedResult);
                    if (r && r.code && r.style) {
                        currentResult = r;
                        currentUserResult = r;
                        window.currentResult = r;
                        window.currentUserResult = r;
                        console.log('从 localStorage 恢复 currentResult:', r);
                    }
                } catch(e) { console.error('解析失败:', e); }
            }
        })();
        
        function startTest() {
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('testPage').classList.add('active');
            currentIndex = 0;
            answers = [];
            dimensionScores = { A: 0, I: 0, R: 0, T: 0, C: 0, B: 0, D: 0, P: 0 };
            renderQuestion();
            updateProgress();
        }
        
        function renderQuestion() {
            var q = questions[currentIndex];
            document.getElementById('scene').textContent = q.scene;
            document.getElementById('question').textContent = q.q;
            var html = '';
            q.options.forEach(function(opt, i) {
                html += '<div class="option" onclick="selectOption(this, \'' + opt.dim + '\')">' + opt.text + '</div>';
            });
            document.getElementById('options').innerHTML = html;
            document.getElementById('nextBtn').style.display = 'none';
        }
        
        function selectOption(el, dim) {
            document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('selected'); });
            el.classList.add('selected');
            answers[currentIndex] = dim;
            dimensionScores[dim]++;
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        function nextQuestion() {
            if (answers[currentIndex]) {
                if (currentIndex < 27) {
                    currentIndex++;
                    renderQuestion();
                    updateProgress();
                } else {
                    calculateResult();
                }
            }
        }
        
        function updateProgress() {
            var pct = ((currentIndex + 1) / 28) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            var stage = Math.floor(currentIndex / 7) + 1;
            document.getElementById('progressText').textContent = '第 ' + (currentIndex + 1) + ' / 28 题 · 第 ' + stage + ' 阶段';
        }
        
        function calculateResult() {
            // 计算维度对（>= 确保平局时选第一个，避免总是 I/T/B/P）
            var type = '';
            type += dimensionScores.A >= dimensionScores.I ? 'A' : 'I';
            type += dimensionScores.R >= dimensionScores.T ? 'R' : 'T';
            type += dimensionScores.C >= dimensionScores.B ? 'C' : 'B';
            type += dimensionScores.D >= dimensionScores.P ? 'D' : 'P';
            
            currentResult = { code: type, style: styles[type], scores: dimensionScores };
            currentUserResult = { code: type, style: styles[type], scores: dimensionScores };
            window.currentResult = currentResult;
            window.currentUserResult = currentUserResult;
            localStorage.setItem('myTestResult', JSON.stringify(currentUserResult));
            
            document.getElementById('testPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');
            
            document.getElementById('resultAnimal').textContent = styles[type].animal;
            document.getElementById('resultCode').textContent = type;
            document.getElementById('resultName').textContent = styles[type].name;
            document.getElementById('resultRole').textContent = styles[type].role;
            
            // 渲染 MBTI 洞察
            renderMbtiInsight(type, dimensionScores);
            
            // 渲染神秘标签
            renderMysteryTags(type, dimensionScores);
            
            // 渲染最佳搭档
            if (typeof renderBestMatchOptimized === 'function') {
                renderBestMatchOptimized(type);
            }
            
            window.scrollTo(0, 0);
        }
        
        function getStarCount(percent, threshold) {
            var diff = Math.abs(percent - threshold);
            if (diff >= 30) return 5;
            if (diff >= 20) return 4;
            if (diff >= 10) return 3;
            if (diff >= 5) return 2;
            return 1;
        }
        
        function getStars(count) {
            var stars = '';
            for (var i = 0; i < count; i++) stars += '⭐';
            return stars;
        }
        
        function renderMbtiInsight(code, scores) {
            var el = document.getElementById('mbtiInsight');
            if (!el) return;
            
            var aPercent = Math.round((scores.A / (scores.A + scores.I)) * 100) || 50;
            var rPercent = Math.round((scores.R / (scores.R + scores.T)) * 100) || 50;
            var cPercent = Math.round((scores.C / (scores.C + scores.B)) * 100) || 50;
            var dPercent = Math.round((scores.D / (scores.D + scores.P)) * 100) || 50;
            
            var decisionText = aPercent >= 60 ? '数据驱动' : (aPercent >= 40 ? '直觉与理性并存' : '直觉优先');
            var relationText = rPercent >= 60 ? '关系导向' : (rPercent >= 40 ? '事与人兼顾' : '任务导向');
            var riskText = cPercent >= 60 ? '谨慎保守' : (cPercent >= 40 ? '风险平衡' : '冒险创新');
            var commText = dPercent >= 60 ? '稳健推进' : (dPercent >= 40 ? '灵活适应' : '快速迭代');
            
            var html = '<div style="background:#1c1c1e;padding:16px;border-radius:12px;margin-bottom:12px;">';
            html += '<div style="font-size:13px;font-weight:700;color:#0071e3;margin-bottom:10px;">📊 你的决策风格</div>';
            html += '<div style="font-size:14px;color:#e0e0e0;line-height:1.8;">' + decisionText + ' · ' + relationText + ' · ' + riskText + ' · ' + commText + '</div></div>';
            
            html += '<div style="background:rgba(0,113,227,0.08);padding:16px;border-radius:12px;border:1px solid rgba(0,113,227,0.2);">';
            html += '<div style="font-size:13px;font-weight:700;color:#0071e3;margin-bottom:10px;">💡 核心特质</div>';
            html += '<div style="font-size:14px;color:#e0e0e0;line-height:1.8;">';
            html += '你的谈判风格是 <strong style="color:#34c759;">' + code + ' ' + styles[code].name + '</strong>。<br>';
            html += styles[code].role + '。<br><br>';
            html += '<strong>优势：</strong>你在谈判中善于 ' + (aPercent >= 50 ? '用数据支撑决策' : '凭直觉快速判断') + '，';
            html += (rPercent >= 50 ? '重视关系维护' : '关注任务达成') + '，';
            html += (cPercent >= 50 ? '谨慎评估风险' : '敢于尝试新机会') + '，';
            html += (dPercent >= 50 ? '稳步推进执行' : '灵活适应变化') + '。<br><br>';
            html += '<strong>注意：</strong>' + (aPercent < 50 ? '做重大决定前，多看看数据会更稳妥。' : '别太依赖数据，有时候直觉也很重要。') + ' ';
            html += (rPercent < 50 ? '适当关心一下对方的感受，关系也是生产力。' : '关系重要，但也要坚守原则和底线。');
            html += '</div></div>';
            
            el.innerHTML = html;
        }
        
        function renderMysteryTags(code, scores) {
            var el = document.getElementById('mysteryTags');
            if (!el) return;
            
            var tags = [];
            
            // 根据主导维度生成标签
            if (scores.A >= 7) tags.push({ text: '数据控', color: '#0071e3' });
            if (scores.I >= 7) tags.push({ text: '直觉王', color: '#34c759' });
            if (scores.R >= 7) tags.push({ text: '人心捕手', color: '#ff9500' });
            if (scores.T >= 7) tags.push({ text: '任务终结者', color: '#ff2d55' });
            if (scores.C >= 7) tags.push({ text: '风险守门员', color: '#5ac8fa' });
            if (scores.B >= 7) tags.push({ text: '机会捕手', color: '#bf5af2' });
            if (scores.D >= 7) tags.push({ text: '稳健派', color: '#30b35a' });
            if (scores.P >= 7) tags.push({ text: '创新者', color: '#ff6482' });
            
            // 如果没有特别突出的，给一个平衡型标签
            if (tags.length === 0) {
                tags.push({ text: '全能平衡型', color: '#0071e3' });
            }
            
            var html = '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
            tags.forEach(function(tag) {
                html += '<span class="tag" style="background:rgba(' + hexToRgb(tag.color) + ',0.2);color:' + tag.color + ';padding:8px 14px;border-radius:980px;font-size:13px;font-weight:600;">' + tag.text + '</span>';
            });
            html += '</div>';
            
            el.innerHTML = html;
        }
        
        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 
                parseInt(result[1], 16) + ',' + parseInt(result[2], 16) + ',' + parseInt(result[3], 16) : 
                '0,113,227';
        }
        
        function goHome() {
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('homePage').classList.add('active');
        }
    </script>
</body>
</html>
