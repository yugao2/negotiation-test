<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试中 - 采购谈判风格测试</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container test-container">
        <!-- 进度条 -->
        <header class="test-header">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">28</span>
                </div>
            </div>
        </header>

        <!-- 题目区域 -->
        <main class="test-main">
            <div class="question-card" id="questionCard">
                <h2 class="question-text" id="questionText">加载中...</h2>
                <div class="options-container" id="optionsContainer">
                    <!-- 选项将通过 JS 动态生成 -->
                </div>
            </div>

            <!-- 导航按钮 -->
            <div class="navigation">
                <button class="btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>
                    ← 上一题
                </button>
                <button class="btn-primary" id="nextBtn" onclick="nextQuestion()">
                    下一题 →
                </button>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>请根据你的第一反应选择最符合的选项</p>
        </footer>
    </div>

    <script src="js/questions.js"></script>
    <script src="js/test.js"></script>
</body>
</html>
