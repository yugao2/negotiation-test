<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购谈判风格测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .progress { background: #e0e0e0; border-radius: 10px; height: 8px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; width: 3.57%; transition: width 0.3s; }
        .progress-text { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        .question { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px 20px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: #667eea; background: #f5f6ff; }
        .option.selected { border-color: #667eea; background: #667eea; color: white; }
        .option-label { font-weight: 600; margin-bottom: 5px; }
        .option-text { font-size: 14px; line-height: 1.5; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .btn-prev { background: #f0f0f0; color: #666; }
        .btn-prev:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-next { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
        .footer { text-align: center; margin-top: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 28</div>
        
        <div class="question" id="questionText">加载中...</div>
        
        <div class="options" id="optionsContainer"></div>
        
        <div class="nav-buttons">
            <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
            <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
        </div>
        
        <div class="footer">请根据第一反应选择</div>
    </div>

    <script>
        // 题目数据（直接内嵌，避免加载外部文件）
        const questions = [
            {id:1,text:"在供应商选择时，你更倾向于：",options:[{label:'A',text:'详细分析所有数据，对比多家供应商的优劣势',score:'A'},{label:'B',text:'相信自己的行业经验和直觉判断',score:'I'},{label:'C',text:'参考同行推荐和口碑评价',score:'I'},{label:'D',text:'建立评估模型，量化各项指标后决策',score:'A'}]},
            {id:2,text:"面对新的采购品类，你会：",options:[{label:'A',text:'先做充分的市场调研和技术分析',score:'A'},{label:'B',text:'快速尝试，在实践中学习和调整',score:'I'},{label:'C',text:'找专家咨询，听取专业意见',score:'I'},{label:'D',text:'制定详细的评估标准和流程',score:'A'}]},
            {id:3,text:"谈判前准备，你通常会：",options:[{label:'A',text:'收集大量数据，做详尽的准备工作',score:'A'},{label:'B',text:'把握大方向，细节随机应变',score:'I'},{label:'C',text:'依靠过往经验，快速制定策略',score:'I'},{label:'D',text:'列出所有可能的情况和应对方案',score:'A'}]},
            {id:4,text:"当供应商报价超出预算时，你首先：",options:[{label:'A',text:'分析成本结构，找出可优化的部分',score:'A'},{label:'B',text:'凭经验判断是否有水分，直接砍价',score:'I'},{label:'C',text:'询问市场行情，对比其他供应商',score:'I'},{label:'D',text:'要求对方提供详细的成本 breakdown',score:'A'}]},
            {id:5,text:"做采购决策时，你最看重：",options:[{label:'A',text:'客观数据和事实依据',score:'A'},{label:'B',text:'整体感觉和大方向正确',score:'I'},{label:'C',text:'业内专家的意见建议',score:'I'},{label:'D',text:'系统化的评估结果',score:'A'}]},
            {id:6,text:"面对复杂的采购项目，你会：",options:[{label:'A',text:'分解成多个子项目，逐一分析',score:'A'},{label:'B',text:'把握核心关键点，其他灵活处理',score:'I'},{label:'C',text:'找有经验的同事一起讨论',score:'I'},{label:'D',text:'建立完整的项目管理框架',score:'A'}]},
            {id:7,text:"当数据与直觉冲突时，你更相信：",options:[{label:'A',text:'数据，它不会说谎',score:'A'},{label:'B',text:'直觉，多年经验积累的判断',score:'I'},{label:'C',text:'综合考量，但直觉权重更大',score:'I'},{label:'D',text:'重新验证数据，确保准确性',score:'A'}]},
            {id:8,text:"与供应商合作，你认为最重要的是：",options:[{label:'A',text:'建立长期信任的伙伴关系',score:'R'},{label:'B',text:'确保每次交易都获得最优条件',score:'T'},{label:'C',text:'保持良好沟通，互利共赢',score:'R'},{label:'D',text:'严格按合同执行，结果导向',score:'T'}]},
            {id:9,text:"当供应商出现交付问题时，你会：",options:[{label:'A',text:'先了解原因，一起想办法解决',score:'R'},{label:'B',text:'按合同条款追究责任',score:'T'},{label:'C',text:'考虑长期合作，适度宽容',score:'R'},{label:'D',text:'评估影响，启动备选方案',score:'T'}]},
            {id:10,text:"选择供应商时，关系因素占多大权重：",options:[{label:'A',text:'很重要，关系好合作更顺畅',score:'R'},{label:'B',text:'不重要，只看能力和价格',score:'T'},{label:'C',text:'比较重要，但非决定因素',score:'R'},{label:'D',text:'次要因素，业绩才是关键',score:'T'}]},
            {id:11,text:"谈判中，你更倾向于：",options:[{label:'A',text:'营造友好氛围，寻求双赢',score:'R'},{label:'B',text:'直奔主题，高效解决问题',score:'T'},{label:'C',text:'先建立关系，再谈业务',score:'R'},{label:'D',text:'聚焦目标，不被情感影响',score:'T'}]},
            {id:12,text:"对于老供应商，你会：",options:[{label:'A',text:'给予一定优先权和信任',score:'R'},{label:'B',text:'每次都要重新评估竞争力',score:'T'},{label:'C',text:'维护关系，但保持适度竞争',score:'R'},{label:'D',text:'用绩效说话，优胜劣汰',score:'T'}]},
            {id:13,text:"与供应商的沟通频率，你倾向于：",options:[{label:'A',text:'经常沟通，保持紧密联系',score:'R'},{label:'B',text:'有事说事，不必频繁打扰',score:'T'},{label:'C',text:'定期沟通，维护关系',score:'R'},{label:'D',text:'按需要沟通，效率优先',score:'T'}]},
            {id:14,text:"当价格与关系冲突时，你会：",options:[{label:'A',text:'适当让步，维护长期关系',score:'R'},{label:'B',text:'坚持价格，商业归商业',score:'T'},{label:'C',text:'寻找平衡点，兼顾双方',score:'R'},{label:'D',text:'用数据说服对方调整',score:'T'}]},
            {id:15,text:"面对新的供应商，你的态度是：",options:[{label:'A',text:'谨慎评估，充分验证后再合作',score:'C'},{label:'B',text:'大胆尝试，快速建立合作',score:'B'},{label:'C',text:'小批量试单，逐步扩大',score:'C'},{label:'D',text:'抓住机会，抢先建立优势',score:'B'}]},
            {id:16,text:"对于创新技术方案，你会：",options:[{label:'A',text:'充分验证成熟度后再采用',score:'C'},{label:'B',text:'积极尝试，抢占先机',score:'B'},{label:'C',text:'观望一段时间，看市场反馈',score:'C'},{label:'D',text:'快速试点，迭代优化',score:'B'}]},
            {id:17,text:"谈判中遇到不确定因素，你会：",options:[{label:'A',text:'暂停谈判，先搞清楚再说',score:'C'},{label:'B',text:'边谈边调整，灵活应对',score:'B'},{label:'C',text:'设置保护条款，降低风险',score:'C'},{label:'D',text:'相信直觉，果断决策',score:'B'}]},
            {id:18,text:"对于单一供应商依赖，你的看法是：",options:[{label:'A',text:'风险太大，必须开发备选',score:'C'},{label:'B',text:'深度绑定，换取更好条件',score:'B'},{label:'C',text:'保持警惕，逐步降低依赖',score:'C'},{label:'D',text:'看情况，有时集中更优',score:'B'}]},
            {id:19,text:"市场波动时，你的采购策略是：",options:[{label:'A',text:'保守观望，等待趋势明朗',score:'C'},{label:'B',text:'逆势操作，抓住机会',score:'B'},{label:'C',text:'分批采购，分散风险',score:'C'},{label:'D',text:'快速决策，灵活调整',score:'B'}]},
            {id:20,text:"签订长期合同时，你会：",options:[{label:'A',text:'详细约定各种情况和条款',score:'C'},{label:'B',text:'把握大框架，细节可调整',score:'B'},{label:'C',text:'加入退出机制，保留灵活性',score:'C'},{label:'D',text:'快速签约，抢占资源',score:'B'}]},
            {id:21,text:"面对高风险高回报的项目，你会：",options:[{label:'A',text:'谨慎评估，可能放弃',score:'C'},{label:'B',text:'愿意冒险，博取高回报',score:'B'},{label:'C',text:'控制投入，限制风险敞口',score:'C'},{label:'D',text:'快速决策，全力投入',score:'B'}]},
            {id:22,text:"谈判开场，你通常会：",options:[{label:'A',text:'直接表明立场和要求',score:'D'},{label:'B',text:'先寒暄，营造轻松氛围',score:'P'},{label:'C',text:'简明扼要说明来意',score:'D'},{label:'D',text:'从共同话题切入，拉近距离',score:'P'}]},
            {id:23,text:"表达不同意见时，你会：",options:[{label:'A',text:'直接指出，不绕弯子',score:'D'},{label:'B',text:'委婉表达，照顾对方感受',score:'P'},{label:'C',text:'清晰说明，但注意语气',score:'D'},{label:'D',text:'先肯定，再提出建议',score:'P'}]},
            {id:24,text:"谈判陷入僵局时，你会：",options:[{label:'A',text:'直接提出解决方案',score:'D'},{label:'B',text:'缓和气氛，换个角度沟通',score:'P'},{label:'C',text:'明确底线，推动决策',score:'D'},{label:'D',text:'寻找共同点，重建共识',score:'P'}]},
            {id:25,text:"与供应商讨价还价，你的风格是：",options:[{label:'A',text:'直接给出目标价，不浪费时间',score:'D'},{label:'B',text:'逐步引导，让对方主动让步',score:'P'},{label:'C',text:'明确表达期望，坚持立场',score:'D'},{label:'D',text:'用数据和逻辑说服对方',score:'P'}]},
            {id:26,text:"反馈供应商表现时，你会：",options:[{label:'A',text:'直接指出问题和不足',score:'D'},{label:'B',text:'先表扬，再提改进建议',score:'P'},{label:'C',text:'坦诚沟通，对事不对人',score:'D'},{label:'D',text:'用建设性方式表达',score:'P'}]},
            {id:27,text:"团队内部讨论采购策略，你倾向于：",options:[{label:'A',text:'直接表达观点，快速决策',score:'D'},{label:'B',text:'倾听大家意见，协调共识',score:'P'},{label:'C',text:'明确表达自己的立场',score:'D'},{label:'D',text:'用影响力说服团队成员',score:'P'}]},
            {id:28,text:"结束谈判时，你会：",options:[{label:'A',text:'明确总结达成的共识和下一步',score:'D'},{label:'B',text:'感谢对方，保持良好关系',score:'P'},{label:'C',text:'确认关键条款，避免误解',score:'D'},{label:'D',text:'表达合作期待，展望未来',score:'P'}]}
        ];

        let currentIndex = 0;
        let answers = [];

        // 初始化
        function init() {
            console.log('初始化，题目数:', questions.length);
            renderQuestion();
            updateProgress();
        }

        // 渲染题目
        function renderQuestion() {
            const q = questions[currentIndex];
            document.getElementById('questionText').textContent = q.text;
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                if (answers[currentIndex] === opt.score) div.classList.add('selected');
                div.onclick = () => selectOption(opt.score);
                div.innerHTML = '<div class="option-label">' + opt.label + '</div><div class="option-text">' + opt.text + '</div>';
                container.appendChild(div);
            });
            
            updateNav();
        }

        // 选择选项
        function selectOption(score) {
            answers[currentIndex] = score;
            document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            setTimeout(() => {
                if (currentIndex < 27) nextQuestion();
            }, 300);
        }

        // 上一题
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
                updateProgress();
            }
        }

        // 下一题
        function nextQuestion() {
            if (!answers[currentIndex]) {
                alert('请先选择');
                return;
            }
            if (currentIndex < 27) {
                currentIndex++;
                renderQuestion();
                updateProgress();
            } else {
                // 完成测试，计算结果
                calculateResult();
            }
        }

        // 计算结果
        function calculateResult() {
            // 统计各维度得分
            let scores = {A:0, I:0, R:0, T:0, C:0, B:0, D:0, P:0};
            
            questions.forEach((q, i) => {
                const answer = answers[i];
                if (answer) scores[answer]++;
            });
            
            // 确定各维度类型
            const dim1 = scores.A >= 4 ? 'A' : 'I';
            const dim2 = scores.R >= 4 ? 'R' : 'T';
            const dim3 = scores.C >= 4 ? 'C' : 'B';
            const dim4 = scores.D >= 4 ? 'D' : 'P';
            
            const code = dim1 + dim2 + dim3 + dim4;
            
            // 保存结果
            localStorage.setItem('testResult', code);
            localStorage.setItem('testScores', JSON.stringify(scores));
            
            // 跳转到结果页
            window.location.href = 'result-simple.html';
        }

        // 更新进度
        function updateProgress() {
            const pct = ((currentIndex + 1) / 28) * 100;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressText').textContent = (currentIndex + 1) + ' / 28';
        }

        // 更新导航
        function updateNav() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').innerHTML = currentIndex === 27 ? '完成 →' : '下一题 →';
        }

        // 启动
        init();
    </script>
</body>
</html>
